name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # The required gate. Covers both surfaces now that the product is code-first:
  # the plugin manifests/hooks AND the installable Python package. A broken
  # manifest, a hook that won't compile, a lint failure, or a red test all ship
  # straight to users, so this blocks every PR to main.
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Manifests parse as JSON
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json hooks/hooks.json; do
            python3 -m json.tool "$f" >/dev/null && echo "ok  $f" || { echo "BAD $f"; exit 1; }
          done

      - name: plugin.json and pyproject.toml versions agree
        run: |
          python3 - <<'PY'
          import json, re, sys
          pv = json.load(open(".claude-plugin/plugin.json"))["version"]
          text = open("pyproject.toml").read()
          m = re.search(r'^version\s*=\s*"([^"]+)"', text, re.MULTILINE)
          if not m:
              sys.exit("no version in pyproject.toml")
          if m.group(1) != pv:
              sys.exit("version mismatch: plugin.json %s != pyproject.toml %s" % (pv, m.group(1)))
          print("ok: both at", pv)
          PY

      - name: Hook scripts referenced in hooks.json exist and are executable
        run: |
          python3 - <<'PY'
          import json, os, sys

          with open("hooks/hooks.json") as fh:
              cfg = json.load(fh)

          # Collect every command string declared under any event.
          commands = []
          for entries in cfg.get("hooks", {}).values():
              for entry in entries:
                  for hook in entry.get("hooks", []):
                      if hook.get("type") == "command" and hook.get("command"):
                          commands.append(hook["command"])

          if not commands:
              sys.exit("no command hooks found in hooks/hooks.json")

          failed = False
          for command in commands:
              # Resolve ${CLAUDE_PLUGIN_ROOT} to the repo root and take the first
              # token, dropping the quotes that wrap the env var in the command.
              resolved = command.replace("${CLAUDE_PLUGIN_ROOT}", ".")
              path = resolved.strip().split()[0].replace('"', "")
              if not os.path.isfile(path):
                  print(f"BAD  missing: {path}")
                  failed = True
              elif not os.access(path, os.X_OK):
                  print(f"BAD  not executable: {path}")
                  failed = True
              else:
                  print(f"ok   {path}")

          sys.exit(1 if failed else 0)
          PY

      - name: Byte-compile hooks and package
        run: |
          python3 -m py_compile hooks/session-end.py hooks/session-start.py hooks/_adapter.py
          python3 -m compileall -q postcommit

      - name: Install the package
        run: python3 -m pip install --upgrade pip && python3 -m pip install .

      - name: CLI smoke test
        run: |
          postcommit --version
          postcommit extract --help >/dev/null
          echo '{}' | postcommit hook session-end   # must exit 0 on empty payload

      - name: Lint (ruff)
        run: python3 -m pip install ruff && ruff check postcommit tests hooks

      - name: Unit tests
        # stdlib unittest only — no test deps to install. Fixtures shell out to
        # git, which is preinstalled on ubuntu-latest.
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v

      - name: Shellcheck dev scripts
        run: shellcheck scripts/link-local.sh scripts/run-tests.sh

  # Prove the dependency-free core installs and tests green across the supported
  # Python range, not just the validate job's 3.12.
  test-matrix:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install the package
        run: python3 -m pip install .
      - name: Unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

  # Non-blocking security lint of the executable code. continue-on-error keeps
  # it advisory during initial adoption; drop the flag after a cleanup pass so
  # it gates like the other checks.
  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: python3 -m pip install --upgrade bandit

      - name: Scan package and hooks
        run: python3 -m bandit -r postcommit hooks -ll

  # Guards the "explicit version must be bumped every release or users never
  # update" footgun: on a published release, the git tag must equal the version
  # in both plugin.json and pyproject.toml (validate already checks those agree).
  version-guard:
    name: version-guard
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tag matches plugin.json version
        run: |
          manifest_version="$(python3 -c 'import json; print(json.load(open(".claude-plugin/plugin.json"))["version"])')"
          tag="${GITHUB_REF_NAME#v}"
          echo "plugin.json version: $manifest_version"
          echo "release tag (v-stripped): $tag"
          if [ "$manifest_version" != "$tag" ]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' does not match plugin.json version '$manifest_version'"
            exit 1
          fi
          echo "ok: tag matches plugin.json version"
